<!DOCTYPE html>
<html lang="en" class="scroll-smooth" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Support Chat | Creative Parrot</title>
  <meta name="description" content="Private admin inbox for Creative Parrot support chats." />
  <link rel="icon" href="assets/images/parrot-hero.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:["Poppins","sans-serif"]},colors:{gold:"#facc15"},boxShadow:{neon:"0 0 26px rgba(250, 204, 21, 0.25)","soft-red":"0 0 26px rgba(251, 113, 133, 0.2)"}}}}};</script>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="font-sans text-white antialiased selection:bg-yellow-400/30">
  <div id="bg-base" class="fixed inset-0 -z-10 bg-black"></div>
  <div id="bg-glow" class="pointer-events-none fixed inset-0 -z-10 bg-[radial-gradient(circle_at_20%_20%,rgba(250,204,21,0.12),transparent_30%),radial-gradient(circle_at_80%_30%,rgba(239,68,68,0.10),transparent_28%)]"></div>
  <div id="theme-transition" aria-hidden="true"></div>

  <header id="navbar" class="fixed top-0 z-50 w-full transition-all duration-300"><nav class="mx-auto max-w-7xl px-5 py-4 md:px-8"><div class="flex items-center justify-between"><a href="index.html" class="flex items-center gap-2"><img src="assets/images/logo.png" alt="Creative Parrot logo" class="h-10 w-auto max-w-[64px] object-contain" /><span class="text-xs uppercase tracking-[0.2em] text-zinc-300">Support Admin</span></a><button id="theme-toggle" type="button" aria-label="Switch to light mode" class="theme-toggle inline-flex h-10 w-10 items-center justify-center rounded-full text-sm text-yellow-200 transition hover:scale-105 hover:shadow-neon"><span id="theme-icon" aria-hidden="true">☀</span></button></div></nav></header>

  <main class="mx-auto max-w-7xl px-5 pb-10 pt-28 md:px-8">
    <section class="reveal mb-6 rounded-2xl border border-yellow-300/30 bg-black/40 p-5"><div class="flex items-center justify-between gap-3"><h1 class="text-2xl font-bold uppercase tracking-[0.2em]">Support Inbox</h1><div class="flex items-center gap-2"><button id="refresh-admin" class="rounded-full border border-yellow-300/35 px-4 py-2 text-xs font-semibold uppercase tracking-[0.16em] text-gold transition hover:shadow-neon">Refresh</button><button id="clear-all-admin" class="rounded-full border border-red-400/40 px-4 py-2 text-xs font-semibold uppercase tracking-[0.16em] text-red-300 transition hover:shadow-[0_0_24px_rgba(248,113,113,0.35)]">Clear All</button></div></div></section>
    <section class="grid grid-cols-1 gap-6 lg:grid-cols-12">
      <aside class="reveal gradient-border rounded-2xl p-4 lg:col-span-4"><h2 class="mb-3 text-sm font-semibold uppercase tracking-[0.18em] text-gold">Clients</h2><div id="conversation-list" class="space-y-2"></div></aside>
      <section class="reveal gradient-border rounded-2xl p-4 lg:col-span-8">
        <div class="mb-4 flex flex-wrap items-center justify-between gap-2"><p id="active-client-id" class="text-xs uppercase tracking-[0.14em] text-zinc-400">Select a client</p><div class="flex items-center gap-2"><span id="active-status-badge" class="inline-flex rounded-full border border-zinc-600 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-[0.12em] text-zinc-300">-</span><button id="accept-chat" class="hidden rounded-full border border-emerald-400/45 px-3 py-1.5 text-xs font-semibold uppercase tracking-[0.14em] text-emerald-300 transition">Accept</button><button id="close-chat" class="rounded-full border border-red-400/45 px-3 py-1.5 text-xs font-semibold uppercase tracking-[0.14em] text-red-300 transition">Close Chat</button><button id="clear-chat" class="rounded-full border border-zinc-500 px-3 py-1.5 text-xs font-semibold uppercase tracking-[0.14em] text-zinc-300 transition">Clear Chat</button></div></div>
        <div id="message-view" class="max-h-[52vh] space-y-3 overflow-auto pr-1"></div>
        <form id="admin-reply-form" class="mt-4 flex items-center gap-2"><input id="admin-reply-input" type="text" placeholder="Type admin reply..." class="input-ring w-full rounded-xl border border-yellow-300/45 bg-zinc-950 px-3 py-2 text-sm text-zinc-200 outline-none placeholder:text-zinc-500" /><button type="submit" class="rounded-xl bg-gold px-4 py-2 text-xs font-semibold uppercase tracking-[0.16em] text-black">Send</button></form>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    (function () {
      const API_BASE = "./api";
      const listEl = document.getElementById("conversation-list");
      const viewEl = document.getElementById("message-view");
      const activeClientLabel = document.getElementById("active-client-id");
      const activeStatusBadge = document.getElementById("active-status-badge");
      const refreshButton = document.getElementById("refresh-admin");
      const clearAllButton = document.getElementById("clear-all-admin");
      const acceptButton = document.getElementById("accept-chat");
      const closeButton = document.getElementById("close-chat");
      const clearChatButton = document.getElementById("clear-chat");
      const replyForm = document.getElementById("admin-reply-form");
      const replyInput = document.getElementById("admin-reply-input");
      
      let selectedClientId = null;
      let conversationData = {};
      
      const formatDate = (ts) => new Date(ts).toLocaleString([], { month: "short", day: "2-digit", hour: "2-digit", minute: "2-digit" });
      
      const statusClass = (s) => 
        s === "active" ? "border-emerald-300/60 text-emerald-300 bg-emerald-500/10" : 
        s === "closed" ? "border-red-300/60 text-red-300 bg-red-500/10" : 
        "border-yellow-300/60 text-yellow-300 bg-yellow-500/10";
      
      const loadConversations = async () => {
        try {
          const res = await fetch(`${API_BASE}/admin-get.php`);
          const data = await res.json();
          
          if (!data.success) {
            console.error("Failed to load conversations:", data.error);
            return;
          }
          
          conversationData = data.conversations || {};
          renderList();
        } catch (e) {
          console.error("Load conversations error:", e);
        }
      };
      
      const renderMessages = (clientId) => {
        const rec = clientId ? conversationData[clientId] : null;
        const status = rec?.status || null;
        
        activeClientLabel.textContent = clientId ? `Client ID: ${clientId}` : "Select a client";
        activeStatusBadge.textContent = status || "-";
        activeStatusBadge.className = `inline-flex rounded-full border px-2 py-0.5 text-[10px] font-semibold uppercase tracking-[0.12em] ${status ? statusClass(status) : "border-zinc-600 text-zinc-300"}`;
        
        acceptButton.classList.toggle("hidden", status !== "pending");
        
        const closed = status === "closed";
        replyInput.disabled = !clientId || closed;
        replyForm.querySelector('button[type="submit"]').disabled = !clientId || closed;
        
        viewEl.innerHTML = "";
        
        if (!clientId) {
          viewEl.innerHTML = '<p class="text-sm text-zinc-400">Select a client from the left panel.</p>';
          return;
        }
        
        (rec?.messages || []).forEach((msg) => {
          const item = document.createElement("article");
          item.className = `chat-bubble ${msg.who === "client" || msg.who === "user" ? "user" : "bot"}`;
          item.innerHTML = `<p class="text-sm"></p><p class="mt-1 text-[10px] uppercase tracking-[0.12em] text-zinc-400"></p>`;
          item.children[0].textContent = msg.text || "";
          item.children[1].textContent = `${msg.who || "system"} • ${formatDate(msg.timestamp)}`;
          viewEl.appendChild(item);
        });
        
        if ((rec?.messages || []).length === 0) {
          viewEl.innerHTML = '<p class="text-sm text-zinc-400">No messages yet.</p>';
        }
      };
      
      const renderList = () => {
        const items = Object.keys(conversationData)
          .map((id) => ({ id, rec: conversationData[id] }))
          .sort((a, b) => (b.rec.updatedAt || 0) - (a.rec.updatedAt || 0));
        
        listEl.innerHTML = "";
        
        if (items.length === 0) {
          listEl.innerHTML = '<p class="text-sm text-zinc-400">No conversations yet.</p>';
          selectedClientId = null;
          renderMessages(null);
          return;
        }
        
        items.forEach(({ id, rec }) => {
          const btn = document.createElement("button");
          btn.className = `w-full rounded-xl border px-3 py-3 text-left transition ${
            selectedClientId === id 
              ? "border-yellow-300/60 bg-yellow-300/10" 
              : "border-zinc-700/80 bg-zinc-900/50 hover:border-yellow-300/40"
          }`;
          btn.innerHTML = `
            <div class="flex items-center justify-between gap-2">
              <p class="truncate text-xs font-semibold uppercase tracking-[0.12em] text-zinc-200">${id}</p>
              <span class="inline-flex rounded-full border px-2 py-0.5 text-[10px] font-semibold uppercase tracking-[0.12em] ${statusClass(rec.status)}">${rec.status}</span>
            </div>
            <p class="mt-1 text-xs text-zinc-400">${rec.messages?.length || 0} message(s)</p>
          `;
          btn.addEventListener("click", () => {
            selectedClientId = id;
            renderList();
            renderMessages(id);
          });
          listEl.appendChild(btn);
        });
        
        if (!selectedClientId || !conversationData[selectedClientId]) {
          selectedClientId = items[0]?.id || null;
        }
        renderMessages(selectedClientId);
      };
      
      acceptButton.addEventListener("click", async () => {
        if (!selectedClientId) return;
        
        try {
          const res = await fetch(`${API_BASE}/chat-status.php`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ clientId: selectedClientId, status: "active" })
          });
          
          const data = await res.json();
          if (data.success) {
            await loadConversations();
          } else {
            console.error("Failed to accept chat:", data.error);
            alert("Failed to accept chat: " + (data.error || "Unknown error"));
          }
        } catch (e) {
          console.error("Accept chat error:", e);
          alert("Network error: " + e.message);
        }
      });
      
      closeButton.addEventListener("click", async () => {
        if (!selectedClientId) return;
        
        try {
          const res = await fetch(`${API_BASE}/chat-status.php`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ clientId: selectedClientId, status: "closed" })
          });
          
          const data = await res.json();
          if (data.success) {
            await loadConversations();
          } else {
            console.error("Failed to close chat:", data.error);
            alert("Failed to close chat: " + (data.error || "Unknown error"));
          }
        } catch (e) {
          console.error("Close chat error:", e);
          alert("Network error: " + e.message);
        }
      });
      
      clearChatButton.addEventListener("click", async () => {
        if (!selectedClientId) return;
        if (!window.confirm("Delete this chat conversation permanently?")) return;
        
        try {
          // For now, just close the chat and clear locally
          // In a production app, you'd want a delete endpoint
          const res = await fetch(`${API_BASE}/chat-status.php`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ clientId: selectedClientId, status: "closed" })
          });
          
          if (res.ok) {
            const clientToDelete = selectedClientId;
            delete conversationData[clientToDelete];
            selectedClientId = null;
            renderList();
          }
        } catch (e) {
          console.error("Clear chat error:", e);
          alert("Network error: " + e.message);
        }
      });
      
      replyForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = (replyInput.value || "").trim();
        
        if (!text || !selectedClientId) {
          console.warn("Empty message or no client selected");
          return;
        }
        
        try {
          const res = await fetch(`${API_BASE}/admin-send.php`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ clientId: selectedClientId, message: text, timestamp: Date.now() })
          });
          
          const data = await res.json();
          if (data.success) {
            replyInput.value = "";
            replyInput.focus();
            await loadConversations();
          } else {
            console.error("Failed to send reply:", data.error);
            alert("Failed to send message: " + (data.error || "Unknown error"));
          }
        } catch (e) {
          console.error("Send reply error:", e);
          alert("Network error: " + e.message);
        }
      });
      
      refreshButton.addEventListener("click", loadConversations);
      
      clearAllButton.addEventListener("click", () => {
        alert("Clear all conversations feature not yet implemented. Use the clear chat button for individual conversations.");
      });
      
      // Initial load
      loadConversations();
      
      // Poll for new messages every 2 seconds
      window.setInterval(loadConversations, 2000);
    })();
  </script>
</body>
</html>
